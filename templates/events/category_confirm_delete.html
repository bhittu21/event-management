{% extends 'base.html' %}

{% block title %}Delete Category - {{ block.super }}{% endblock %}

{% block content %}
<div class="container mx-auto px-6 py-10">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-xl shadow-md p-10">
            <h1 class="text-2xl font-bold text-gray-800 mb-5">Delete Category</h1>
            
            <p class="text-gray-600 mb-8 text-lg">
                Are you sure you want to delete "<strong>{{ category.name }}</strong>"?
                Events in this category will become uncategorized.
            </p>

            <form method="post" class="flex justify-end space-x-4">
                {% csrf_token %}
                <a href="{% url 'category_list' %}" class="btn bg-gray-200 text-gray-800 hover:bg-gray-300">
                    Cancel
                </a>
                <button type="submit" class="btn bg-red-600 text-white hover:bg-red-700">
                    Delete
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
